# Blueprint de déploiement Render.
# Les secrets (clés) sont en sync:false -> à saisir dans le dashboard Render, JAMAIS ici.
services:
  - type: web
    name: coach-fitness-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+14155238886
      - key: DATABASE_PATH
        value: coach.db
      # --- MODE TEST : temps accéléré pour voir le proactif sans attendre des jours.
      # TIME_FACTOR=288 -> 5 min réelles = 1 jour. TICK_SECONDS=8 -> le scheduler
      # scanne souvent (indispensable en temps accéléré). ⚠️ REMETTRE 1.0 / 300 en prod.
      - key: TIME_FACTOR
        value: "288"
      - key: TICK_SECONDS
        value: "8"
